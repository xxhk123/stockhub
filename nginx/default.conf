server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 开启 gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # 静态文件缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # 新浪财经 API 代理
    location /api/sina/ {
        proxy_pass https://hq.sinajs.cn/;
        proxy_set_header Host hq.sinajs.cn;
        proxy_set_header Referer https://finance.sina.com.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_cache stockhub_cache;
        proxy_cache_valid 200 3s;
        proxy_cache_key "$scheme$request_method$uri$is_args$args";
    }

    # 腾讯财经 API 代理（K 线数据）
    location /api/tencent/ {
        proxy_pass https://web.ifzq.gtimg.cn/;
        proxy_set_header Host web.ifzq.gtimg.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_cache stockhub_cache;
        proxy_cache_valid 200 60s;
    }

    # Yahoo Finance API 代理
    location /api/yahoo/ {
        proxy_pass https://query1.finance.yahoo.com/;
        proxy_set_header Host query1.finance.yahoo.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_cache stockhub_cache;
        proxy_cache_valid 200 3s;
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 缓存配置
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=stockhub_cache:10m max_size=100m inactive=60m;
}
