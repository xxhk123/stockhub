server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 开启 gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # 静态文件缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # 新浪财经 API 代理
    location /api/sina/ {
        proxy_pass https://hq.sinajs.cn/;
        proxy_set_header Host hq.sinajs.cn;
        proxy_set_header Referer https://finance.sina.com.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    # 新浪 K 线 API 代理
    location /api/sina-kline {
        proxy_pass https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData;
        proxy_set_header Host money.finance.sina.com.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    # Yahoo Finance API 代理
    location /api/yahoo/ {
        proxy_pass https://query1.finance.yahoo.com/;
        proxy_set_header Host query1.finance.yahoo.com;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
        proxy_set_header Referer "https://finance.yahoo.com";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
